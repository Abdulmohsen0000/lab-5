{% extends 'tax_app/base.html' %}

{% block title %}Home - Tax Calculator{% endblock %}

{% block content %}
<div class="card">
    <h2 style="font-size: 2rem; margin-bottom: 20px; color: #1a1a2e;">Welcome</h2>
    <p style="font-size: 1.2rem; color: #555; line-height: 1.8; margin-bottom: 30px;">
        This is a site to calculate tax.
    </p>
    <hr style="border: none; border-top: 1px solid #eee; margin: 30px 0;">
    <p style="color: #888; font-size: 0.95rem; margin-bottom: 20px;">
        Enter any number after the URL to calculate the price with tax applied.
    </p>
    <p style="color: #888; font-size: 0.9rem;">
        Example: <code style="background:#f0f0f0; padding: 3px 8px; border-radius: 3px;">/250</code>
        &nbsp;&rarr;&nbsp; calculates tax on 250
    </p>
</div>
{% endblock %}
